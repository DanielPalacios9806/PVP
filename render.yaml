services:
  - type: web
    name: arena-os-api-staging
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run db:generate && npm run build:shared && npm run build:api
    preDeployCommand: npm run db:migrate:deploy
    startCommand: npm --workspace apps/api run start
    envVars:
      - key: SERVER_ENV
        value: staging
      - key: API_PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RIOT_MODE
        value: mock
      - key: RIOT_API_KEY
        sync: false
      - key: RIOT_API_BASE_URL
        value: https://americas.api.riotgames.com
      - key: RIOT_PLATFORM
        value: LA1
      - key: RIOT_REGION
        value: AMERICAS
      - key: RIOT_CALLBACK_URL
        sync: false
      - key: RIOT_PROVIDER_ID
        sync: false
      - key: RIOT_TOURNAMENT_ID
        sync: false

  - type: web
    name: arena-os-web-staging
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build:shared && npm run build:web
    startCommand: cd apps/web && node .next/standalone/apps/web/server.js
    envVars:
      - key: SERVER_ENV
        value: staging
      - key: WEB_PORT
        value: 3000
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
