name: deploy-ubuntu

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          REF_NAME: ${{ github.ref_name }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: REF_NAME
          script: |
            set -e
            APP_PATH="${APP_PATH:-/opt/arena-os/app}"
            ENV_FILE="${ENV_FILE:-/opt/arena-os/env/.env.server}"

            cd "$APP_PATH"
            git fetch --all --prune
            git checkout "$REF_NAME"
            git pull origin "$REF_NAME"

            docker compose --env-file "$ENV_FILE" up -d db
            docker compose --env-file "$ENV_FILE" run --rm migrate
            docker compose --env-file "$ENV_FILE" run --rm seed
            docker compose --env-file "$ENV_FILE" up -d --build proxy api web
            docker compose --env-file "$ENV_FILE" ps
