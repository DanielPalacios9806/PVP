name: arena-os

services:
  proxy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      API_DOMAIN: ${API_DOMAIN:-api.localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@example.com}
      CADDY_AUTO_HTTPS: ${CADDY_AUTO_HTTPS:-off}
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - public
      - internal
    mem_limit: 256m
    cpus: 0.50

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    restart: unless-stopped
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal
    mem_limit: 1024m
    cpus: 1.50

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:change-me@db:5432/esports_platform?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-now}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      RIOT_API_KEY: ${RIOT_API_KEY:-}
      RIOT_API_BASE_URL: ${RIOT_API_BASE_URL:-https://americas.api.riotgames.com}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - internal
    mem_limit: 1024m
    cpus: 1.50

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-esports_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-esports_platform}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - internal
    mem_limit: 2048m
    cpus: 2.00

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles: ["ops"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:change-me@db:5432/esports_platform?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-now}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      RIOT_API_KEY: ${RIOT_API_KEY:-}
      RIOT_API_BASE_URL: ${RIOT_API_BASE_URL:-https://americas.api.riotgames.com}
    command: ["npx", "prisma", "migrate", "deploy", "--schema", "prisma/schema.prisma"]
    networks:
      - internal

  seed:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles: ["ops"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:change-me@db:5432/esports_platform?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me-now}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      RIOT_API_KEY: ${RIOT_API_KEY:-}
      RIOT_API_BASE_URL: ${RIOT_API_BASE_URL:-https://americas.api.riotgames.com}
    command: ["npx", "tsx", "prisma/seed.ts"]
    networks:
      - internal

  adminer:
    image: adminer:4-standalone
    profiles: ["admin"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - internal

networks:
  public:
    driver: bridge
  internal:
    driver: bridge

volumes:
  db_data:
  caddy_data:
  caddy_config:
